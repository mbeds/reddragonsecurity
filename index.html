  <meta charset="UTF-8" />
  <title>Red Dragon Security – Elite Penetration Testing & Adversary Simulation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="canonical" href="https://www.red-dragon-security.com" />

  <style>
    :root {
      --bg-gradient: radial-gradient(circle at top left, #8B0000 0%, #1a1a1a 40%, #000000 100%);
      --accent-red: #ff1e38;
      --accent-soft: #ff4d63;
      --text-main: #f5f5f5;
      --text-muted: #b3b3b3;
      --card-bg: rgba(10, 10, 10, 0.85);
      --border-soft: rgba(255, 30, 56, 0.35);
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg-gradient);
      color: var(--text-main);
      font-family: var(--font-main);
      background-attachment: fixed;
    }

    header {
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      z-index: 999;
    }

    .nav-container {
      max-width: 1200px;
      margin: auto;
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.95rem;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-red), #3b000f);
      box-shadow: 0 0 18px rgba(255,30,56,0.7);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
      padding: 0;
      margin: 0;
      align-items: center;
    }

    nav a {
      color: var(--text-main);
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    nav a:hover {
      opacity: 1;
    }

    main {
      max-width: 1200px;
      margin: auto;
      padding: 2.5rem 1.25rem;
    }

    section {
      margin-bottom: 4rem;
    }

    section h2 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    section > p {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-bottom: 2rem;
      max-width: 800px;
    }

    /* HERO */
    .hero {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 2.5rem;
      align-items: center;
      margin-bottom: 5rem;
    }

    .hero h1 {
      font-size: 3rem;
      line-height: 1.15;
      margin-bottom: 1.2rem;
      letter-spacing: -0.03em;
    }

    .hero h1 span {
      background: linear-gradient(135deg, #fff 30%, var(--accent-soft));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-subtitle {
      font-size: 1.15rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .hero-actions {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .btn-primary,
    .btn-secondary {
      padding: 0.8rem 1.8rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-red), var(--accent-soft));
      border: none;
      color: #fff;
      box-shadow: 0 0 20px rgba(255,30,56,0.5);
    }

    .btn-primary:hover {
      opacity: 0.95;
      transform: translateY(-1px);
      box-shadow: 0 0 25px rgba(255,30,56,0.7);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-soft);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      border-color: var(--accent-red);
      background: rgba(255,30,56,0.05);
    }

    .signup-card {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .signup-card h2 {
      font-size: 1.5rem;
      margin-bottom: 0.4rem;
    }

    .signup-card > p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1.2rem;
    }

    .signup-card form {
      display: grid;
      gap: 0.8rem;
    }

    input, select, textarea {
      background: #050505;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.75rem 0.9rem;
      border-radius: 8px;
      color: var(--text-main);
      font-size: 0.9rem;
      font-family: var(--font-main);
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-red);
    }

    textarea {
      height: 100px;
      resize: none;
    }

    select option {
      background: #111;
      color: var(--text-main);
    }

    /* GRID SYSTEM */
    .grid-3,
    .grid-4 {
      display: grid;
      gap: 1.5rem;
    }

    .grid-3 {
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }

    .grid-4 {
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .card {
      background: var(--card-bg);
      padding: 1.75rem;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--border-soft);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .card h3 {
      font-size: 1.2rem;
      margin-top: 0;
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }

    .card p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin: 0;
    }

    /* ECOSYSTEM NETWORK SECTION */
    .ecosystem-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .ecosystem-card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 1.75rem;
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .ecosystem-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
      opacity: 0.4;
      transition: opacity 0.25s ease;
    }

    .ecosystem-card:hover {
      border-color: var(--border-soft);
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(255,30,56,0.15);
    }

    .ecosystem-card:hover::before {
      opacity: 1;
    }

    .ecosystem-tag {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent-soft);
      margin-bottom: 0.6rem;
      font-weight: 600;
    }

    .ecosystem-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--accent-soft);
      margin-top: 1.25rem;
      font-weight: 500;
      transition: gap 0.2s ease;
    }

    .ecosystem-card:hover .ecosystem-link {
      gap: 0.6rem;
    }

    /* CONTACT SECTION */
    #contact {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 2.5rem;
      border-radius: 16px;
    }

    #contact p {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 0;
    }

    #contact a {
      color: var(--accent-soft);
      text-decoration: none;
    }

    #contact a:hover {
      text-decoration: underline;
    }

    /* MOBILE BREAKPOINTS */
    @media (max-width: 960px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 3rem;
      }
      
      .hero h1 {
        font-size: 2.4rem;
      }

      nav {
        display: none;
      }
    }

    @media (max-width: 600px) {
      main {
        padding: 1.5rem 1rem;
      }

      .hero h1 {
        font-size: 2rem;
      }

      .signup-card, #contact {
        padding: 1.25rem;
      }
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      background: rgba(0,0,0,0.85);
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>

  <div class="grid-3">

<section id="process">
